
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWS Cloud Governance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    font-size:32px;
}

.aws{
    color:#ff9900;
}

.refresh{
    color:#94a3b8;
    font-size:14px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card h3{
    color:#94a3b8;
    margin-bottom:10px;
}

.card .value{
    font-size:42px;
    font-weight:bold;
}

.score-card{
    display:flex;
    justify-content:center;
    align-items:center;
}

.score-wrapper{
    width:220px;
    height:220px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.chart-card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
}

.chart-card h2{
    margin-bottom:20px;
}

.table-card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
}

.table-card h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e293b;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.high{
    background:#dc2626;
}

.medium{
    background:#f59e0b;
}

.low{
    background:#16a34a;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
    color:#22c55e;
}

.dot{
    width:10px;
    height:10px;
    background:#22c55e;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:0.3}
    100%{opacity:1}
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}

@media(max-width:1000px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="header">
    <h1><span class="aws">AWS</span> Cloud Governance Dashboard</h1>

    <div class="status">
        <div class="dot"></div>
        Live Monitoring
    </div>
</div>

<div class="dashboard">

    <div class="card score-card">
        <div class="score-wrapper">
            <canvas id="scoreChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Total Findings</h3>
        <div class="value" id="totalFindings">0</div>
    </div>

    <div class="card">
        <h3>High Severity</h3>
        <div class="value" id="highCount">0</div>
    </div>

    <div class="card">
        <h3>Medium Severity</h3>
        <div class="value" id="mediumCount">0</div>
    </div>

</div>

<div class="grid">

    <div class="chart-card">
        <h2>Severity Distribution</h2>
        <canvas id="severityChart"></canvas>
    </div>

    <div class="chart-card">
        <h2>Governance Summary</h2>

        <div style="margin-top:20px">

            <p style="margin-bottom:15px;">
                Governance Score:
                <strong id="scoreText">0</strong>
            </p>

            <p style="margin-bottom:15px;">
                Findings:
                <strong id="findingsText">0</strong>
            </p>

            <p>
                Last Updated:
                <strong id="lastUpdated">--</strong>
            </p>

        </div>

    </div>

</div>

<div class="table-card">

    <h2>Security Findings</h2>

    <table>

        <thead>
            <tr>
                <th>Severity</th>
                <th>Finding</th>
            </tr>
        </thead>

        <tbody id="findingsTable">

        </tbody>

    </table>

</div>

<div class="footer">
    Auto Refresh Every 30 Seconds
</div>

<script>

const API_URL =
"https://dhs3ykcjna.execute-api.ap-south-1.amazonaws.com/findings";

let scoreChart;
let severityChart;

function createCharts(score, high, medium){

    if(scoreChart) scoreChart.destroy();

    scoreChart = new Chart(
        document.getElementById("scoreChart"),
        {
            type:"doughnut",
            data:{
                datasets:[
                {
                    data:[score,100-score],
                    backgroundColor:[
                        "#ff9900",
                        "#1e293b"
                    ],
                    borderWidth:0
                }]
            },
            options:{
                cutout:"80%",
                plugins:{
                    legend:{display:false},
                    tooltip:{enabled:false}
                }
            }
        }
    );

    if(severityChart) severityChart.destroy();

    severityChart = new Chart(
        document.getElementById("severityChart"),
        {
            type:"pie",
            data:{
                labels:["High","Medium"],
                datasets:[
                {
                    data:[high,medium],
                    backgroundColor:[
                        "#dc2626",
                        "#f59e0b"
                    ]
                }]
            }
        }
    );
}

async function loadData(){

    try{

        const response = await fetch(API_URL);

        const data = await response.json();

        document.getElementById("totalFindings").innerText =
            data.total_findings;

        document.getElementById("highCount").innerText =
            data.high;

        document.getElementById("mediumCount").innerText =
            data.medium;

        const score =
    Math.max(0, 100 - (data.total_findings * 10));

document.getElementById("scoreText").innerText =
    score;

        document.getElementById("findingsText").innerText =
            data.total_findings;

        document.getElementById("lastUpdated").innerText =
            new Date().toLocaleTimeString();

        createCharts(
            score,
            data.high,
            data.medium
        );

        let rows = "";

        data.findings.forEach(item => {

            const issue = item.issue || "";

            let severity = "LOW";

            if(issue.includes("HIGH")){
                severity = "HIGH";
            }
            else if(issue.includes("MEDIUM")){
                severity = "MEDIUM";
            }

            rows += `
            <tr>
                <td>
                    <span class="badge ${severity.toLowerCase()}">
                        ${severity}
                    </span>
                </td>
                <td>${issue}</td>
            </tr>
            `;
        });

        document.getElementById("findingsTable").innerHTML =
            rows;

    }
    catch(err){

        console.log(err);

    }
}

loadData();

setInterval(loadData,30000);

</script>

</body>
</html>
